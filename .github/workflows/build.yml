name: Build and Push

on:
  push:
    branches: [main]
  schedule:
    - cron: '13 3 * * *'  # nightly rebuild for upstream Camoufox updates
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          no-cache: true
          tags: ghcr.io/${{ github.repository }}:test

      - name: Smoke test — camofox health check
        run: |
          docker run -d --name camofox-test -p 19377:9377 ghcr.io/${{ github.repository }}:test
          # Wait for server to start
          for i in $(seq 1 30); do
            if curl -sf http://localhost:19377/health > /dev/null 2>&1; then
              echo "Health check passed"
              curl -s http://localhost:19377/health
              break
            fi
            sleep 2
          done
          docker logs camofox-test --tail 20
          docker stop camofox-test && docker rm camofox-test

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
